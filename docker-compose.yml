version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - socialpedia-net

  server:
    build: ./server
    container_name: socialpedia-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - mongo
    networks:
      - socialpedia-net

  client:
    build: ./client
    container_name: socialpedia-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - socialpedia-net

volumes:
  mongo-data:

networks:
  socialpedia-net:
    driver: bridge