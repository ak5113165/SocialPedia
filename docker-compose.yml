services:
  mongo:
    image: mongo:6
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - socialpedia-net

  server:
    build:
      context: ./server
    container_name: socialpedia-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      PORT: 3001
      MONGO_URL: mongodb://mongo:27017/socialpedia
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - socialpedia-net

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_BASE_URL: http://localhost:3001
    container_name: socialpedia-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - socialpedia-net

volumes:
  mongo-data:

networks:
  socialpedia-net:
    driver: bridge